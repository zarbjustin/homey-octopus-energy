<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script type="text/javascript" src="/homey.js" data-origin="widget"></script>
  <style>
    html, body { margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: var(--homey-text-color, #222); padding: 12px 14px; }
    .name { font-size: 12px; color: var(--homey-text-color-light, #888); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .big { font-size: 32px; font-weight: 700; margin: 4px 0; }
    .big small { font-size: 13px; font-weight: 500; color: var(--homey-text-color-light, #888); }
    .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; color: #fff; text-transform: capitalize; }
    .very_low, .low { background: #2ecc71; }
    .moderate { background: #f39c12; }
    .high, .very_high { background: #e74c3c; }
    .green { color: #2ecc71; font-size: 12px; margin-top: 6px; font-weight: 600; }
    .err { font-size: 13px; color: var(--homey-text-color-light, #888); }
    .freshness { color: #b45309; font-size: 10px; margin-top: 5px; }
    .prov-badge { display: inline-block; font-size: 10px; padding: 1px 5px; border-radius: 6px; margin-left: 4px; }
    .prov-row { margin: 4px 0 6px; }
    .prov-msg { color: #b45309; font-size: 10px; margin-left: 4px; }
    .b-current { background: #dcfce7; color: #166534; }
    .b-stale { background: #fef3c7; color: #b45309; }
    .b-unknown { background: #e5e7eb; color: #6b7280; }
    .b-estimated { background: #ede9fe; color: #5b21b6; }
  </style>
</head>
<body>
  <div id="content" aria-live="polite"><div class="err">Loading…</div></div>
  <script type="text/javascript">
    function esc(value) {
      return String(value).replace(/[&<>"']/g, function (char) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char];
      });
    }
    function provenanceBadge(label, cls) { return '<span class="prov-badge ' + cls + '">' + esc(label) + '</span>'; }
    function estimatedBadge(label) { return provenanceBadge(label || 'Estimated', 'b-estimated'); }
    function freshnessHtml(d, sourceLabel, sourceKey) {
      var f = d && d.freshness;
      var src = (f && f.sources && sourceKey) ? f.sources[sourceKey] : null;
      var state = 'Unknown';
      var cls = 'b-unknown';
      var message = 'Freshness is not yet known.';
      var readAt = f ? f.updatedAt : null;
      if (src) {
        readAt = src.updatedAt;
        if (src.state === 'current') { state = 'Current'; cls = 'b-current'; message = ''; }
        else if (src.state === 'stale') { state = 'Stale'; cls = 'b-stale'; message = (f && f.problem) ? 'Connection issue; showing the last available data.' : 'Data may be out of date.'; }
        else { message = 'No data yet.'; }
      } else if (f && f.updatedAt && !f.stale && !f.problem) { state = 'Current'; cls = 'b-current'; message = ''; }
      else if (f && f.updatedAt) { state = 'Stale'; cls = 'b-stale'; message = f.problem ? 'Connection issue; showing the last available data.' : 'Data may be out of date.'; }
      else if (f && f.problem) { message = 'Connection issue; current data is unavailable.'; }
      var age = (typeof ageText === 'function') ? ageText(readAt) : '';
      var label = (sourceLabel || 'Device refresh') + ' \u00b7 ' + state + (age ? ' \u00b7 ' + age : '');
      return '<div class="prov-row" role="status">' + provenanceBadge(label, cls)
        + (message ? '<span class="prov-msg">' + esc(message) + '</span>' : '') + '</div>';
    }
    function ageText(readAt) {
      if (!readAt) return '';
      var t = Date.parse(readAt);
      if (isNaN(t)) return '';
      var s = Math.max(0, Math.round((Date.now() - t) / 1000));
      return s < 90 ? (s + 's ago') : (Math.round(s / 60) + 'm ago');
    }
    function render(d) {
      const el = document.getElementById('content');
      if (!d || d.error || d.carbon === null || d.carbon === undefined) {
        el.innerHTML = '<div class="err">' + esc((d && d.error) || 'No carbon data yet') + '</div>';
        return;
      }
      const level = ['very_low', 'low', 'moderate', 'high', 'very_high'].includes(d.level)
        ? d.level : 'moderate';
      const label = level.replace('_', ' ');
      let html = '<div class="name">' + esc(d.name || 'Carbon intensity') + '</div>';
      html += freshnessHtml(d, 'Carbon', 'carbon');
      html += '<div class="big">' + Math.round(d.carbon) + ' <small>gCO₂/kWh</small></div>';
      html += '<span class="badge ' + level + '">' + label + '</span>';
      if (d.greenest) html += '<div class="green">🌱 Greenest half-hour right now' + estimatedBadge('Estimated forecast') + '</div>';
      el.innerHTML = html;
    }
    function onHomeyReady(Homey) {
      let deviceId = '';
      try { const s = Homey.getSettings(); if (s && s.device) deviceId = (typeof s.device === 'object') ? (s.device.id || '') : s.device; } catch (e) {}
      async function load() {
        try {
          const data = await Homey.api('GET', '/?id=' + encodeURIComponent(deviceId));
          render(data); Homey.setHeight(document.body.scrollHeight);
        } catch (err) { render({ error: (err && err.message) || 'Error' }); }
      }
      load(); setInterval(load, 60000); Homey.ready();
    }
  </script>
</body>
</html>

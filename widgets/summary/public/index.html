<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script type="text/javascript" src="/homey.js" data-origin="widget"></script>
  <style>
    html, body { margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: var(--homey-text-color, #222); padding: 12px 14px; }
    .name { font-size: 12px; color: var(--homey-text-color-light, #888); margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; }
    .cell .k { font-size: 11px; color: var(--homey-text-color-light, #888); }
    .cell .v { font-size: 18px; font-weight: 700; }
    .err { font-size: 13px; color: var(--homey-text-color-light, #888); }
    .freshness { color: #b45309; font-size: 10px; margin: -3px 0 7px; }
    .badge { font-size: 10px; padding: 1px 5px; border-radius: 6px; margin-left: 4px; }
    .b-current { background: #dcfce7; color: #166534; }
    .b-stale { background: #fef3c7; color: #b45309; }
    .b-unknown { background: #e5e7eb; color: #6b7280; }
    .b-planned { background: #dbeafe; color: #1e40af; }
    .b-finalised { background: #e5e7eb; color: #374151; }
    .b-estimated { background: #ede9fe; color: #5b21b6; }
    .live, .disp { font-size: 12px; margin-top: 8px; }
    .live .v, .disp .v { font-weight: 700; }
    .eff { font-size: 12px; margin-top: 8px; }
    .eff .v { font-weight: 700; }
    .eff .row { margin-top: 2px; }
    .ev { font-size: 12px; margin-top: 8px; border-top: 1px solid var(--homey-line-color, #eee); padding-top: 6px; }
    .ev .k { font-size: 11px; color: var(--homey-text-color-light, #888); }
    .muted { font-size: 10px; color: var(--homey-text-color-light, #888); }
    .prov-badge { display: inline-block; font-size: 10px; padding: 1px 5px; border-radius: 6px; margin-left: 4px; }
    .prov-row { margin: 4px 0 6px; }
    .prov-msg { color: #b45309; font-size: 10px; margin-left: 4px; }
  </style>
</head>
<body>
  <div id="content" aria-live="polite"><div class="err">Loading…</div></div>
  <script type="text/javascript">
    function n(v, dp) { return (v === null || v === undefined || isNaN(v)) ? '–' : Number(v).toFixed(dp === undefined ? 2 : dp); }
    function esc(value) {
      return String(value).replace(/[&<>"']/g, function (char) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char];
      });
    }
    function provenanceBadge(label, cls) { return '<span class="prov-badge ' + cls + '">' + esc(label) + '</span>'; }
    function estimatedBadge(label) { return provenanceBadge(label || 'Estimated', 'b-estimated'); }
    function freshnessHtml(d, sourceLabel, sourceKey) {
      var f = d && d.freshness;
      var src = (f && f.sources && sourceKey) ? f.sources[sourceKey] : null;
      var state = 'Unknown';
      var cls = 'b-unknown';
      var message = 'Freshness is not yet known.';
      var readAt = f ? f.updatedAt : null;
      if (src) {
        readAt = src.updatedAt;
        if (src.state === 'current') { state = 'Current'; cls = 'b-current'; message = ''; }
        else if (src.state === 'stale') { state = 'Stale'; cls = 'b-stale'; message = (f && f.problem) ? 'Connection issue; showing the last available data.' : 'Data may be out of date.'; }
        else { message = 'No data yet.'; }
      } else if (f && f.updatedAt && !f.stale && !f.problem) { state = 'Current'; cls = 'b-current'; message = ''; }
      else if (f && f.updatedAt) { state = 'Stale'; cls = 'b-stale'; message = f.problem ? 'Connection issue; showing the last available data.' : 'Data may be out of date.'; }
      else if (f && f.problem) { message = 'Connection issue; current data is unavailable.'; }
      var age = (typeof ageText === 'function') ? ageText(readAt) : '';
      var label = (sourceLabel || 'Device refresh') + ' \u00b7 ' + state + (age ? ' \u00b7 ' + age : '');
      return '<div class="prov-row" role="status">' + provenanceBadge(label, cls)
        + (message ? '<span class="prov-msg">' + esc(message) + '</span>' : '') + '</div>';
    }
    function badge(label, cls) { return '<span class="badge ' + cls + '">' + esc(label) + '</span>'; }
    function ageText(readAt) {
      if (!readAt) return '';
      const t = Date.parse(readAt); if (isNaN(t)) return '';
      const s = Math.max(0, Math.round((Date.now() - t) / 1000));
      return s < 90 ? (s + 's ago') : (Math.round(s / 60) + 'm ago');
    }
    function shortTime(iso) { try { return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); } catch (e) { return ''; } }
    function liveHtml(d) {
      const l = d && d.live;
      if (!l) return '';
      if (l.state === 'unknown' || l.netW === null || l.netW === undefined) {
        return '<div class="live" role="status"><span class="k">Live power</span> <span class="v">–</span>' + badge('No data', 'b-unknown') + '</div>';
      }
      const b = l.state === 'current' ? badge('Live · ' + ageText(l.readAt), 'b-current') : badge('Stale', 'b-stale');
      const dir = l.exportW > 0 ? ('Export ' + n(l.exportW, 0) + ' W') : ('Import ' + n(l.importW, 0) + ' W');
      return '<div class="live" role="status"><span class="k">Live power</span> <span class="v">' + esc(dir) + '</span>' + b
        + '<div class="muted">Net-derived from Home Mini</div></div>';
    }
    function dispatchHtml(d) {
      const disp = d && d.dispatch;
      if (!disp) return '';
      let html = '';
      if (disp.activeNow) {
        html += '<div class="disp">' + esc('Smart charging now') + badge('Planned', 'b-planned') + '</div>';
      } else if (disp.next) {
        html += '<div class="disp">' + esc('Next planned: ' + shortTime(disp.next.start) + '–' + shortTime(disp.next.end)) + badge('Planned', 'b-planned') + '</div>';
      }
      if (disp.recentFinalised && disp.recentFinalised.length) {
        const f = disp.recentFinalised[0];
        html += '<div class="disp">' + esc('Last dispatch ended ' + shortTime(f.end)) + badge('Finalised', 'b-finalised')
          + '<div class="muted">A completed control window — not a billed rate or settlement.</div></div>';
      }
      return html;
    }
    function confBadge(c) {
      const map = { high: 'b-current', medium: 'b-planned', low: 'b-stale', unknown: 'b-unknown' };
      return badge('Confidence: ' + esc(c || 'unknown'), map[c] || 'b-unknown');
    }
    function priceStr(v) {
      return (v === null || v === undefined || isNaN(v)) ? '–' : (Number(v).toFixed(2) + ' p/kWh');
    }
    function effectiveHtml(d) {
      const e = d && d.effectivePrice;
      if (!e) return '';
      let html = '<div class="eff">';
      html += '<div class="row"><span class="k">Household rate</span> <span class="v">' + priceStr(e.householdBase) + '</span></div>';
      html += '<div class="row"><span class="k">Estimated effective</span> <span class="v">' + priceStr(e.estimatedEffective) + '</span>'
        + badge('Estimated', 'b-estimated') + confBadge(e.confidence) + '</div>';
      html += '<div class="muted">Estimate only for your whole-home meter — not a bill or settlement.</div>';
      if (e.finalisedPrevHalfHour !== null && e.finalisedPrevHalfHour !== undefined) {
        html += '<div class="row"><span class="k">Previous half-hour</span> <span class="v">' + priceStr(e.finalisedPrevHalfHour) + '</span>' + badge('Finalised · REST', 'b-finalised') + '</div>';
      }
      html += '</div>';
      const ev = e.ev;
      if (ev && (ev.peak !== null && ev.peak !== undefined || ev.offPeak !== null && ev.offPeak !== undefined)) {
        html += '<div class="ev"><div class="k">EV device pricing ' + badge('EV', 'b-planned') + '</div>';
        html += '<div class="row">Peak <strong>' + priceStr(ev.peak) + '</strong> · Off-peak <strong>' + priceStr(ev.offPeak) + '</strong></div>';
        html += '<div class="muted">EV-device rates only, not your household rate. Managed charging is settled ' + esc(ev.allowanceWindow || '') + '.</div>';
        html += '</div>';
      }
      return html;
    }
    function render(d) {
      const el = document.getElementById('content');
      if (!d || d.error) { el.innerHTML = '<div class="err">' + esc((d && d.error) || 'No data') + '</div>'; return; }
      let cells = '';
      cells += '<div class="cell"><div class="k">Balance</div><div class="v">£' + n(d.balance) + '</div></div>';
      cells += '<div class="cell"><div class="k">Used (24h)</div><div class="v">' + n(d.usage) + ' kWh</div></div>';
      cells += '<div class="cell"><div class="k">Cost (24h)</div><div class="v">£' + n(d.cost) + '</div></div>';
      cells += '<div class="cell"><div class="k">This month</div><div class="v">£' + n(d.month) + '</div></div>';
      if (d.points !== null && d.points !== undefined) {
        cells += '<div class="cell"><div class="k">Octoplus</div><div class="v">' + n(d.points, 0) + ' pts</div></div>';
      }
      el.innerHTML = '<div class="name">' + esc(d.name || 'Octopus') + '</div>'
        + freshnessHtml(d, 'Device refresh') + '<div class="grid">' + cells + '</div>'
        + liveHtml(d) + dispatchHtml(d) + effectiveHtml(d);
    }
    function onHomeyReady(Homey) {
      let deviceId = '';
      try { const s = Homey.getSettings(); if (s && s.device) deviceId = (typeof s.device === 'object') ? (s.device.id || '') : s.device; } catch (e) {}
      async function load() {
        try {
          const data = await Homey.api('GET', '/?id=' + encodeURIComponent(deviceId));
          render(data); Homey.setHeight(document.body.scrollHeight);
        } catch (err) { render({ error: (err && err.message) || 'Error' }); }
      }
      load(); setInterval(load, 60000); Homey.ready();
    }
  </script>
</body>
</html>

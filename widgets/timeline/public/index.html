<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script type="text/javascript" src="/homey.js" data-origin="widget"></script>
  <style>
    html, body { margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: var(--homey-text-color, #222); padding: 10px 12px; }
    .name { font-size: 12px; color: var(--homey-text-color-light, #888); margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bars { position: relative; display: flex; align-items: stretch; gap: 2px; height: 90px; }
    .zero-line { position: absolute; left: 0; right: 0; height: 1px; background: rgba(127,127,127,0.42); pointer-events: none; }
    .bar-slot { flex: 1; min-width: 0; position: relative; }
    .bar { position: absolute; left: 0; right: 0; background: #888; border-radius: 2px 2px 0 0; min-height: 2px; }
    .bar.cheap { background: #2ecc71; }
    .bar.mid { background: #f39c12; }
    .bar.exp { background: #e74c3c; }
    .bar.neg { background: #6f42c1; border-radius: 0 0 2px 2px; }
    .axis { display: flex; justify-content: space-between; font-size: 10px; color: var(--homey-text-color-light, #888); margin-top: 4px; }
    .err { font-size: 13px; color: var(--homey-text-color-light, #888); }
    .freshness { color: #92400e; font-size: 10px; margin-bottom: 5px; }
    .prov-badge { display: inline-block; font-size: 10px; padding: 1px 5px; border-radius: 6px; margin-left: 4px; }
    .prov-row { margin: 4px 0 6px; }
    .prov-msg { color: #92400e; font-size: 10px; margin-left: 4px; }
    .b-current { background: #dcfce7; color: #166534; }
    .b-stale { background: #fef3c7; color: #92400e; }
    .b-unknown { background: #e5e7eb; color: #4b5563; }
    .b-estimated { background: #ede9fe; color: #5b21b6; }
  </style>
</head>
<body>
  <div id="content" aria-live="polite" role="region" aria-label="Octopus price timeline"><div class="err">Loading…</div></div>

  <script type="text/javascript">
    function esc(value) {
      return String(value).replace(/[&<>"']/g, function (char) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char];
      });
    }
    function provenanceBadge(label, cls) { return '<span class="prov-badge ' + cls + '">' + esc(label) + '</span>'; }
    function estimatedBadge(label) { return provenanceBadge(label || 'Estimated', 'b-estimated'); }
    function freshnessHtml(d, sourceLabel, sourceKey) {
      var f = d && d.freshness;
      var src = (f && f.sources && sourceKey) ? f.sources[sourceKey] : null;
      var state = 'Unknown';
      var cls = 'b-unknown';
      var message = 'Freshness is not yet known.';
      var readAt = f ? f.updatedAt : null;
      if (src) {
        readAt = src.updatedAt;
        if (src.state === 'current') { state = 'Current'; cls = 'b-current'; message = ''; }
        else if (src.state === 'stale') { state = 'Stale'; cls = 'b-stale'; message = (f && f.problem) ? 'Connection issue; showing the last available data.' : 'Data may be out of date.'; }
        else { message = 'No data yet.'; }
      } else if (f && f.updatedAt && !f.stale && !f.problem) { state = 'Current'; cls = 'b-current'; message = ''; }
      else if (f && f.updatedAt) { state = 'Stale'; cls = 'b-stale'; message = f.problem ? 'Connection issue; showing the last available data.' : 'Data may be out of date.'; }
      else if (f && f.problem) { message = 'Connection issue; current data is unavailable.'; }
      var age = (typeof ageText === 'function') ? ageText(readAt) : '';
      var label = (sourceLabel || 'Device refresh') + ' \u00b7 ' + state + (age ? ' \u00b7 ' + age : '');
      return '<div class="prov-row" role="status">' + provenanceBadge(label, cls)
        + (message ? '<span class="prov-msg">' + esc(message) + '</span>' : '') + '</div>';
    }
    function ageText(readAt) {
      if (!readAt) return '';
      var t = Date.parse(readAt);
      if (isNaN(t)) return '';
      var s = Math.max(0, Math.round((Date.now() - t) / 1000));
      return s < 90 ? (s + 's ago') : (Math.round(s / 60) + 'm ago');
    }
    function render(d) {
      const el = document.getElementById('content');
      if (!d || d.error || !d.prices || !d.prices.length) {
        el.innerHTML = '<div class="err">' + esc((d && d.error) || 'No price data yet') + '</div>';
        return;
      }
      const prices = d.prices.slice(0, 24);
      const vals = prices.map((p) => p.price);
      const max = Math.max(...vals, 0);
      const min = Math.min(...vals, 0);
      const range = (max - min) || 1;
      const zeroTop = Math.round(((max - 0) / range) * 1000) / 10;
      let bars = '';
      prices.forEach((p) => {
        const valueTop = Math.round(((max - p.price) / range) * 1000) / 10;
        const top = p.price < 0 ? zeroTop : valueTop;
        const height = Math.max(2, Math.abs(zeroTop - valueTop));
        let cls = 'mid';
        if (p.price < 0) cls = 'neg';
        else if (p.price <= 15) cls = 'cheap';
        else if (p.price >= 30) cls = 'exp';
        bars += '<div class="bar-slot"><div class="bar ' + cls + '" style="top:' + top + '%;height:' + height + '%" title="' + p.price + ' p/kWh"></div></div>';
      });
      function hh(iso) { const dt = new Date(iso); return ('0' + dt.getHours()).slice(-2) + ':' + ('0' + dt.getMinutes()).slice(-2); }
      el.innerHTML = '<div class="name">' + esc(d.name || 'Electricity') + ' — next ' + (prices.length / 2) + 'h</div>'
        + freshnessHtml(d, 'Device refresh')
        + '<div class="bars"><div class="zero-line" style="top:' + zeroTop + '%"></div>' + bars + '</div>'
        + '<div class="axis"><span>' + hh(prices[0].start) + '</span><span>' + hh(prices[prices.length - 1].start) + '</span></div>';
    }

    function onHomeyReady(Homey) {
      let deviceId = '';
      try { const s = Homey.getSettings(); if (s && s.device) deviceId = (typeof s.device === 'object') ? (s.device.id || '') : s.device; } catch (e) {}
      async function load() {
        try {
          const data = await Homey.api('GET', '/?id=' + encodeURIComponent(deviceId));
          render(data);
          Homey.setHeight(document.body.scrollHeight);
        } catch (err) { render({ error: (err && err.message) || 'Error' }); }
      }
      load();
      setInterval(load, 60000);
      Homey.ready();
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script type="text/javascript" src="/homey.js" data-origin="widget"></script>
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--homey-text-color, #222);
      padding: 12px 14px;
    }
    .row { display: flex; align-items: baseline; justify-content: space-between; }
    .name { font-size: 12px; color: var(--homey-text-color-light, #888); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .badge {
      font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px;
      color: #fff; background: #888; text-transform: capitalize;
    }
    .badge.plunge { background: #6f42c1; }
    .badge.cheap { background: #2ecc71; }
    .badge.normal { background: #f39c12; }
    .badge.expensive { background: #e74c3c; }
    .price { font-size: 34px; font-weight: 700; line-height: 1.1; margin: 4px 0; }
    .price small { font-size: 14px; font-weight: 500; color: var(--homey-text-color-light, #888); }
    .meta { display: flex; gap: 14px; font-size: 12px; color: var(--homey-text-color-light, #888); margin-top: 6px; flex-wrap: wrap; }
    .meta b { color: var(--homey-text-color, #222); font-weight: 600; }
    .cheap-line { font-size: 12px; margin-top: 8px; }
    .cheap-line .hl { color: #2ecc71; font-weight: 600; }
    .err { font-size: 13px; color: var(--homey-text-color-light, #888); }
    .freshness { color: #b45309; font-size: 10px; margin-top: 5px; }
    .prov-badge { display: inline-block; font-size: 10px; padding: 1px 5px; border-radius: 6px; margin-left: 4px; }
    .prov-row { margin: 4px 0 6px; }
    .prov-msg { color: #b45309; font-size: 10px; margin-left: 4px; }
    .b-current { background: #dcfce7; color: #166534; }
    .b-stale { background: #fef3c7; color: #b45309; }
    .b-unknown { background: #e5e7eb; color: #6b7280; }
    .b-estimated { background: #ede9fe; color: #5b21b6; }
  </style>
</head>
<body>
  <div id="content" aria-live="polite">
    <div class="err">Loading…</div>
  </div>

  <script type="text/javascript">
    function fmt(v, dp) {
      if (v === null || v === undefined || isNaN(v)) return '–';
      return Number(v).toFixed(dp === undefined ? 2 : dp);
    }

    function esc(value) {
      return String(value).replace(/[&<>"']/g, function (char) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char];
      });
    }

    function provenanceBadge(label, cls) { return '<span class="prov-badge ' + cls + '">' + esc(label) + '</span>'; }
    function estimatedBadge(label) { return provenanceBadge(label || 'Estimated', 'b-estimated'); }
    function freshnessHtml(d, sourceLabel, sourceKey) {
      var f = d && d.freshness;
      var src = (f && f.sources && sourceKey) ? f.sources[sourceKey] : null;
      var state = 'Unknown';
      var cls = 'b-unknown';
      var message = 'Freshness is not yet known.';
      var readAt = f ? f.updatedAt : null;
      if (src) {
        readAt = src.updatedAt;
        if (src.state === 'current') { state = 'Current'; cls = 'b-current'; message = ''; }
        else if (src.state === 'stale') { state = 'Stale'; cls = 'b-stale'; message = (f && f.problem) ? 'Connection issue; showing the last available data.' : 'Data may be out of date.'; }
        else { message = 'No data yet.'; }
      } else if (f && f.updatedAt && !f.stale && !f.problem) { state = 'Current'; cls = 'b-current'; message = ''; }
      else if (f && f.updatedAt) { state = 'Stale'; cls = 'b-stale'; message = f.problem ? 'Connection issue; showing the last available data.' : 'Data may be out of date.'; }
      else if (f && f.problem) { message = 'Connection issue; current data is unavailable.'; }
      var age = (typeof ageText === 'function') ? ageText(readAt) : '';
      var label = (sourceLabel || 'Device refresh') + ' \u00b7 ' + state + (age ? ' \u00b7 ' + age : '');
      return '<div class="prov-row" role="status">' + provenanceBadge(label, cls)
        + (message ? '<span class="prov-msg">' + esc(message) + '</span>' : '') + '</div>';
    }
    function ageText(readAt) {
      if (!readAt) return '';
      var t = Date.parse(readAt);
      if (isNaN(t)) return '';
      var s = Math.max(0, Math.round((Date.now() - t) / 1000));
      return s < 90 ? (s + 's ago') : (Math.round(s / 60) + 'm ago');
    }

    function render(d) {
      const el = document.getElementById('content');
      if (!d || d.error) {
        el.innerHTML = '<div class="err">' + esc((d && d.error) || 'No data') + '</div>';
        return;
      }
      const level = ['plunge', 'cheap', 'normal', 'expensive'].includes(d.level)
        ? d.level : 'normal';
      let html = '';
      html += '<div class="row"><span class="name">' + esc(d.name || 'Electricity') + '</span>';
      html += '<span class="badge ' + level + '">' + level + '</span></div>';
      html += freshnessHtml(d, 'Price', 'prices');
      html += '<div class="price">' + fmt(d.price) + ' <small>p/kWh</small></div>';
      html += '<div class="meta">';
      if (d.power !== null && d.power !== undefined) html += '<span>Now <b>' + Math.round(d.power) + ' W</b></span>';
      html += '<span>Today <b>' + fmt(d.usage) + ' kWh</b></span>';
      html += '<span><b>£' + fmt(d.cost) + '</b></span>';
      html += '<span>Bal <b>£' + fmt(d.balance) + '</b></span>';
      html += '</div>';
      if (d.cheapestStart) {
        html += '<div class="cheap-line">Cheapest soon: <span class="hl">' + esc(d.cheapestStart)
          + '</span> @ ' + fmt(d.cheapestPrice) + ' p/kWh' + estimatedBadge('Estimated best slot') + '</div>';
      }
      el.innerHTML = html;
    }

    function onHomeyReady(Homey) {
      let deviceId = '';
      try {
        const settings = Homey.getSettings();
        if (settings && settings.device) {
          deviceId = (typeof settings.device === 'object') ? (settings.device.id || '') : settings.device;
        }
      } catch (e) { /* no settings */ }

      async function load() {
        try {
          const data = await Homey.api('GET', '/?id=' + encodeURIComponent(deviceId));
          render(data);
          Homey.setHeight(document.body.scrollHeight);
        } catch (err) {
          render({ error: (err && err.message) ? err.message : 'Error' });
        }
      }

      load();
      setInterval(load, 60000);
      Homey.ready();
    }
  </script>
</body>
</html>

name: Publish Homey App

# Requires a repository secret named HOMEY_PAT (a Homey Personal Access Token).
# 1. Create the token: https://tools.developer.homey.app -> account menu (top-right)
#    -> Personal Access Tokens -> Create new token -> copy it.
# 2. Store it as a secret (run in a terminal with the GitHub CLI authenticated):
#       gh secret set HOMEY_PAT -R zarbjustin/homey-octopus-energy
#    or via GitHub: repo -> Settings -> Secrets and variables -> Actions ->
#    New repository secret -> name "HOMEY_PAT".
# 3. Run this workflow from the Actions tab (Run workflow) to publish a build.
on:
  workflow_dispatch:

jobs:
  main:
    name: Publish Homey App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit

      - name: Lint
        run: npm run lint

      - name: Build and test
        run: npm test

      - name: Validate Homey App
        uses: athombv/github-action-homey-app-validate@master
        with:
          level: publish

      - name: Publish Homey App
        uses: athombv/github-action-homey-app-publish@master
        id: publish
        with:
          personal_access_token: ${{ secrets.HOMEY_PAT }}

      - name: URL
        run: |
          echo "Manage your app at ${{ steps.publish.outputs.url }}." >> $GITHUB_STEP_SUMMARY
